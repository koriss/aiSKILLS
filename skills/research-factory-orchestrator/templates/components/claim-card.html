<article class="card claim-card {{STATUS_CLASS}}">
  <h3>{{CLAIM_TITLE}}</h3>
  <p>{{CLAIM_TEXT}}{{INLINE_CITATIONS}}</p>
  <div class="claim-meta">
    <span class="chip {{STATUS_CLASS}}">{{STATUS}}</span>
    <span class="chip">Confidence: {{CONFIDENCE}}</span>
    <span class="chip">Claim: {{CLAIM_ID}}</span>
  </div>
</article>
